<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Dark Romance Moodboard</title>

  <script async defer src="https://assets.pinterest.com/js/pinit.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f0f10;
      font-family: Arial, sans-serif;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    a[data-pin-do] {
      width: 100%;
      max-width: 1200px;
    }
  </style>
</head>

<body>

<h1>Dark Romance Moodboard</h1>

<div class="wrapper">
 <a data-pin-do="embedBoard"
   data-pin-board-width="1200"
   data-pin-scale-height="400"
   data-pin-scale-width="120"
   href="https://www.pinterest.com/jstotch/mood-dark-romance-projekt/">
</a>
</div>
<script>
  window.addEventListener("load", function() {
    if (window.PinUtils) {
      window.PinUtils.build();
    }
  });
</script>
</body>
</html>
